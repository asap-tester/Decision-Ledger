<svg viewBox="0 0 480 820" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0b1a"/>
      <stop offset="100%" stop-color="#07070f"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#7461f5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7461f5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#2dd4a8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#2dd4a8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7461f5"/>
      <stop offset="100%" stop-color="#5a4dc8"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#a08dff"/>
      <stop offset="100%" stop-color="#2dd4a8"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <clipPath id="cardClip">
      <rect rx="14" ry="14" width="100%" height="100%"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="480" height="820" fill="url(#bg)"/>
  <rect width="480" height="820" fill="url(#glow1)"/>
  <rect width="480" height="820" fill="url(#glow2)"/>

  <!-- Header -->
  <!-- Badge -->
  <rect x="170" y="28" width="140" height="22" rx="11" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="184" cy="39" r="3.5" fill="#2dd4a8"/>
  <text x="192" y="43" font-size="9" fill="#a08dff" letter-spacing="1" font-weight="600">DECISION OS</text>

  <!-- Title -->
  <text x="240" y="80" text-anchor="middle" font-size="26" font-weight="800" fill="url(#textGrad)" letter-spacing="-0.5">DecisionLedger</text>
  <text x="240" y="98" text-anchor="middle" font-size="11" fill="rgba(240,238,255,0.5)" font-weight="300">Log choices · Detect patterns · Stop repeating mistakes</text>

  <!-- Stats row -->
  <rect x="16" y="112" width="138" height="58" rx="14" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="85" y="137" text-anchor="middle" font-size="22" font-weight="700" fill="#f0eeff">7</text>
  <text x="85" y="152" text-anchor="middle" font-size="9" fill="rgba(240,238,255,0.28)" letter-spacing="1">LOGGED</text>

  <rect x="171" y="112" width="138" height="58" rx="14" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="240" y="137" text-anchor="middle" font-size="22" font-weight="700" fill="#2dd4a8">71%</text>
  <text x="240" y="152" text-anchor="middle" font-size="9" fill="rgba(240,238,255,0.28)" letter-spacing="1">GOOD CALLS</text>

  <rect x="326" y="112" width="138" height="58" rx="14" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="395" y="137" text-anchor="middle" font-size="22" font-weight="700" fill="#f0eeff">3</text>
  <text x="395" y="152" text-anchor="middle" font-size="9" fill="rgba(240,238,255,0.28)" letter-spacing="1">DAY STREAK</text>

  <!-- Tabs -->
  <rect x="16" y="182" width="448" height="40" rx="14" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Active tab: Log -->
  <rect x="20" y="186" width="144" height="32" rx="10" fill="#7461f5" filter="url(#blur)"/>
  <rect x="20" y="186" width="144" height="32" rx="10" fill="#7461f5"/>
  <text x="92" y="206" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="1">LOG</text>
  <!-- Inactive tabs -->
  <text x="240" y="206" text-anchor="middle" font-size="11" font-weight="600" fill="rgba(240,238,255,0.3)" letter-spacing="1">LEDGER</text>
  <text x="388" y="206" text-anchor="middle" font-size="11" font-weight="600" fill="rgba(240,238,255,0.3)" letter-spacing="1">INSIGHTS</text>

  <!-- Log Card -->
  <rect x="16" y="234" width="448" height="548" rx="14" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="36" y="258" font-size="9" font-weight="700" fill="rgba(240,238,255,0.28)" letter-spacing="2">NEW DECISION</text>

  <!-- Decision textarea -->
  <text x="36" y="278" font-size="11" fill="rgba(240,238,255,0.55)" font-weight="500">What decision did you make?</text>
  <rect x="36" y="284" width="408" height="46" rx="8" fill="rgba(255,255,255,0.04)" stroke="#7461f5" stroke-width="1.5"/>
  <text x="48" y="301" font-size="12" fill="rgba(240,238,255,0.75)">Skipped revision to push a</text>
  <text x="48" y="317" font-size="12" fill="rgba(240,238,255,0.75)">TimeFlow feature…</text>

  <!-- Why textarea -->
  <text x="36" y="346" font-size="11" fill="rgba(240,238,255,0.55)" font-weight="500">Why did you make it?</text>
  <rect x="36" y="352" width="408" height="46" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="48" y="369" font-size="12" fill="rgba(240,238,255,0.4)">e.g. Deadline anxiety, felt behind on the build…</text>

  <!-- Category label -->
  <text x="36" y="415" font-size="11" fill="rgba(240,238,255,0.55)" font-weight="500">Category</text>

  <!-- Pills -->
  <rect x="36" y="422" width="52" height="24" rx="12" fill="rgba(116,97,245,0.12)" stroke="#7461f5" stroke-width="1"/>
  <text x="62" y="438" text-anchor="middle" font-size="11" fill="#a08dff" font-weight="500">Study</text>

  <rect x="96" y="422" width="60" height="24" rx="12" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="126" y="438" text-anchor="middle" font-size="11" fill="rgba(240,238,255,0.55)">Finance</text>

  <rect x="164" y="422" width="44" height="24" rx="12" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="186" y="438" text-anchor="middle" font-size="11" fill="rgba(240,238,255,0.55)">Build</text>

  <rect x="216" y="422" width="50" height="24" rx="12" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="241" y="438" text-anchor="middle" font-size="11" fill="rgba(240,238,255,0.55)">Social</text>

  <rect x="274" y="422" width="52" height="24" rx="12" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="300" y="438" text-anchor="middle" font-size="11" fill="rgba(240,238,255,0.55)">Health</text>

  <rect x="334" y="422" width="44" height="24" rx="12" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="356" y="438" text-anchor="middle" font-size="11" fill="rgba(240,238,255,0.55)">Other</text>

  <!-- Emotion label -->
  <text x="36" y="470" font-size="11" fill="rgba(240,238,255,0.55)" font-weight="500">How do you feel about it?</text>

  <!-- Emotion grid: 4 cols x 2 rows -->
  <!-- Row 1 -->
  <rect x="36" y="478" width="96" height="54" rx="10" fill="rgba(116,97,245,0.12)" stroke="#7461f5" stroke-width="1"/>
  <text x="84" y="499" text-anchor="middle" font-size="18">😤</text>
  <text x="84" y="514" text-anchor="middle" font-size="9" fill="#a08dff">Confident</text>

  <rect x="140" y="478" width="96" height="54" rx="10" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="188" y="499" text-anchor="middle" font-size="18">😰</text>
  <text x="188" y="514" text-anchor="middle" font-size="9" fill="rgba(240,238,255,0.5)">Anxious</text>

  <rect x="244" y="478" width="96" height="54" rx="10" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="292" y="499" text-anchor="middle" font-size="18">😶</text>
  <text x="292" y="514" text-anchor="middle" font-size="9" fill="rgba(240,238,255,0.5)">Unsure</text>

  <rect x="348" y="478" width="96" height="54" rx="10" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="396" y="499" text-anchor="middle" font-size="18">😌</text>
  <text x="396" y="514" text-anchor="middle" font-size="9" fill="rgba(240,238,255,0.5)">Relieved</text>

  <!-- Row 2 -->
  <rect x="36" y="540" width="96" height="54" rx="10" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="84" y="561" text-anchor="middle" font-size="18">😔</text>
  <text x="84" y="576" text-anchor="middle" font-size="9" fill="rgba(240,238,255,0.5)">Guilty</text>

  <rect x="140" y="540" width="96" height="54" rx="10" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="188" y="561" text-anchor="middle" font-size="18">⚡</text>
  <text x="188" y="576" text-anchor="middle" font-size="9" fill="rgba(240,238,255,0.5)">Excited</text>

  <rect x="244" y="540" width="96" height="54" rx="10" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="292" y="561" text-anchor="middle" font-size="18">🔥</text>
  <text x="292" y="576" text-anchor="middle" font-size="9" fill="rgba(240,238,255,0.5)">Rushed</text>

  <rect x="348" y="540" width="96" height="54" rx="10" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="396" y="561" text-anchor="middle" font-size="18">🧊</text>
  <text x="396" y="576" text-anchor="middle" font-size="9" fill="rgba(240,238,255,0.5)">Calm</text>

  <!-- Confidence -->
  <text x="36" y="614" font-size="11" fill="rgba(240,238,255,0.55)" font-weight="500">Confidence: <tspan fill="#a08dff" font-weight="700">70%</tspan></text>
  <text x="36" y="636" font-size="10" fill="rgba(240,238,255,0.28)">Low</text>
  <rect x="58" y="628" width="340" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
  <rect x="58" y="628" width="238" height="4" rx="2" fill="url(#accentGrad)"/>
  <circle cx="296" cy="630" r="9" fill="#7461f5"/>
  <text x="408" y="636" font-size="10" fill="rgba(240,238,255,0.28)">High</text>

  <!-- Reversible -->
  <text x="36" y="656" font-size="11" fill="rgba(240,238,255,0.55)" font-weight="500">Is this reversible?</text>
  <rect x="36" y="663" width="210" height="34" rx="8" fill="rgba(45,212,168,0.12)" stroke="#2dd4a8" stroke-width="1"/>
  <text x="141" y="684" text-anchor="middle" font-size="12" fill="#2dd4a8" font-weight="500">↩ Yes, can undo</text>
  <rect x="254" y="663" width="210" height="34" rx="8" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="359" y="684" text-anchor="middle" font-size="12" fill="rgba(240,238,255,0.5)">🔒 No, locked in</text>

  <!-- CTA button -->
  <rect x="36" y="708" width="408" height="44" rx="14" fill="url(#accentGrad)"/>
  <text x="240" y="734" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="-0.3">Log Decision →</text>

  <!-- Label at bottom -->
  <text x="240" y="798" text-anchor="middle" font-size="10" fill="rgba(240,238,255,0.2)" letter-spacing="0.5">Log Tab — DecisionLedger</text>
</svg>